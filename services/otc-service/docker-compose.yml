services:
  otc-db:
    image: postgres:16
    environment:
      POSTGRES_DB: otc_db
      POSTGRES_USER: otc_user
      POSTGRES_PASSWORD: otc_pass
    ports:
      - "5444:5432"
    volumes:
      - otc-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  otc-db-data:

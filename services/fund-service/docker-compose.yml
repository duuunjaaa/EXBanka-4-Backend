services:
  fund-db:
    image: postgres:16
    environment:
      POSTGRES_DB: fund_db
      POSTGRES_USER: fund_user
      POSTGRES_PASSWORD: fund_pass
    ports:
      - "5445:5432"
    volumes:
      - fund-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  fund-db-data:

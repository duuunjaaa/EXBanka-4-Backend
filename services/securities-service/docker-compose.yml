services:
  securities-db:
    image: postgres:16
    environment:
      POSTGRES_DB: securities_db
      POSTGRES_USER: securities_user
      POSTGRES_PASSWORD: securities_pass
    ports:
      - "5441:5432"
    volumes:
      - securities-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  securities-db-data:

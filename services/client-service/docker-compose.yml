services:
  client-db:
    image: postgres:16
    environment:
      POSTGRES_DB: client_db
      POSTGRES_USER: client_user
      POSTGRES_PASSWORD: client_pass
    ports:
      - "5435:5432"
    volumes:
      - client-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  client-db-data:

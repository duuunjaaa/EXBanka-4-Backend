syntax = "proto3";
package otc;
option go_package = "github.com/RAF-SI-2025/EXBanka-4-Backend/shared/pb/otc";

service OtcService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateNegotiation(CreateNegotiationRequest) returns (NegotiationResponse);
  rpc ListNegotiations(ListNegotiationsRequest) returns (ListNegotiationsResponse);
  rpc GetNegotiation(GetNegotiationRequest) returns (NegotiationResponse);
  rpc CounterOffer(CounterOfferRequest) returns (NegotiationResponse);
  rpc AcceptNegotiation(AcceptNegotiationRequest) returns (NegotiationResponse);
  rpc RejectNegotiation(RejectNegotiationRequest) returns (NegotiationResponse);
  rpc ListContracts(ListContractsRequest) returns (ListContractsResponse);
  rpc ExerciseContract(ExerciseContractRequest) returns (ExerciseContractResponse);
  rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
  // Cross-bank (interbank) negotiation RPCs
  rpc CreateInterbankNegotiation(CreateInterbankNegotiationRequest) returns (InterbankNegotiationResponse);
  rpc InterbankCounterOffer(InterbankCounterOfferRequest)           returns (InterbankNegotiationResponse);
  rpc InterbankGetNegotiation(InterbankNegotiationIdRequest)        returns (InterbankNegotiationResponse);
  rpc InterbankDeleteNegotiation(InterbankNegotiationIdRequest)     returns (OtcEmptyResponse);
  rpc InterbankAcceptNegotiation(InterbankNegotiationIdRequest)     returns (OtcEmptyResponse);
}

message PingRequest {}
message PingResponse { string message = 1; }

message CreateNegotiationRequest {
  int64  buyer_id        = 1;
  string buyer_type      = 2; // CLIENT or EMPLOYEE
  int64  seller_id       = 3;
  string seller_type     = 4; // CLIENT or EMPLOYEE
  string ticker          = 5;
  int32  amount          = 6;
  double price_per_stock = 7;
  string settlement_date = 8; // YYYY-MM-DD
  double premium         = 9;
  string currency        = 10;
}

message CounterOfferRequest {
  int64  negotiation_id  = 1;
  int64  caller_id       = 2;
  string caller_type     = 3; // CLIENT or EMPLOYEE
  int32  amount          = 4;
  double price_per_stock = 5;
  string settlement_date = 6;
  double premium         = 7;
}

message AcceptNegotiationRequest {
  int64  negotiation_id   = 1;
  int64  caller_id        = 2;
  string caller_type      = 3;
  int64  buyer_account_id = 4;
}

message RejectNegotiationRequest {
  int64  negotiation_id = 1;
  int64  caller_id      = 2;
  string caller_type    = 3;
}

message ListNegotiationsRequest {
  int64  caller_id   = 1;
  string caller_type = 2; // CLIENT or EMPLOYEE
}

message GetNegotiationRequest {
  int64 negotiation_id = 1;
}

message NegotiationResponse {
  int64  id              = 1;
  string ticker          = 2;
  int64  seller_id       = 3;
  string seller_type     = 4;
  string seller_name     = 5;
  int64  buyer_id        = 6;
  string buyer_type      = 7;
  string buyer_name      = 8;
  int32  amount          = 9;
  double price_per_stock = 10;
  string settlement_date = 11;
  double premium         = 12;
  string currency        = 13;
  string last_modified   = 14; // RFC3339
  int64  modified_by_id  = 15;
  string modified_by_type = 16;
  string modified_by_name = 17;
  string status          = 18;
}

message ListNegotiationsResponse {
  repeated NegotiationResponse negotiations = 1;
}

message ContractResponse {
  int64  id              = 1;
  int64  negotiation_id  = 2;
  int64  seller_id       = 3;
  string seller_type     = 4;
  string seller_name     = 5;
  int64  buyer_id        = 6;
  string buyer_type      = 7;
  string buyer_name      = 8;
  string ticker          = 9;
  int32  amount          = 10;
  double strike_price    = 11;
  double premium         = 12;
  string currency        = 13;
  string settlement_date = 14;
  string status          = 15;
  string created_at      = 16;
  double profit          = 17;
}

message ListContractsRequest {
  int64  caller_id     = 1;
  string caller_type   = 2;
  string status_filter = 3;
}
message ListContractsResponse {
  repeated ContractResponse contracts = 1;
}

message ExerciseContractRequest {
  int64  contract_id      = 1;
  int64  caller_id        = 2;
  string caller_type      = 3;
  int64  buyer_account_id = 4;
}
message ExerciseContractResponse {
  string status      = 1;
  string executed_at = 2;
}

message GetMarketRequest {
  int64  caller_id   = 1;
  string caller_type = 2;
}
message MarketItem {
  string ticker          = 1;
  string name            = 2;
  int32  amount          = 3;
  double price_per_stock = 4;
  string currency        = 5;
  string last_updated    = 6;
  string owner_name      = 7;
  string owner_bank      = 8;
  int64  owner_id        = 9;
  string owner_type      = 10;
}
message GetMarketResponse {
  repeated MarketItem items = 1;
}

// ── Cross-bank (interbank) negotiation messages ──────────────────────────────

message OtcEmptyResponse {}

message CreateInterbankNegotiationRequest {
  string ticker                 = 1;
  string settlement_date        = 2;
  double price_per_unit         = 3;
  string price_currency         = 4;
  double premium                = 5;
  int32  buyer_routing_number   = 6;
  string buyer_external_id      = 7;
  int32  seller_routing_number  = 8;
  string seller_external_id     = 9;
  int32  creator_routing_number = 10;
  string creator_external_id    = 11;
  int32  amount                 = 12;
  string seller_type            = 13; // CLIENT or EMPLOYEE; defaults to CLIENT if empty
}

message InterbankNegotiationResponse {
  int64  local_id               = 1;
  int32  creator_routing_number = 2;
  string creator_external_id    = 3;
  string ticker                 = 4;
  string settlement_date        = 5;
  double price_per_unit         = 6;
  string price_currency         = 7;
  double premium                = 8;
  int32  amount                 = 9;
  bool   is_ongoing             = 10;
  int32  buyer_routing_number   = 11;
  string buyer_external_id      = 12;
  int32  seller_routing_number  = 13;
  string seller_external_id     = 14;
}

message InterbankNegotiationIdRequest {
  int32  routing_number = 1;
  string external_id    = 2;
}

message InterbankCounterOfferRequest {
  int32  routing_number   = 1;
  string external_id      = 2;
  double price_per_unit   = 3;
  double premium          = 4;
  int32  amount           = 5;
  string settlement_date  = 6;
}

syntax = "proto3";

package auth;

option go_package = "github.com/exbanka/backend/shared/pb/auth";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string access_token  = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
}

message CreateActivationTokenRequest  { int64 employee_id = 1; }
message CreateActivationTokenResponse { string token = 1; }

message ActivateAccountRequest {
  string token            = 1;
  string password         = 2;
  string confirm_password = 3;
}
message ActivateAccountResponse {}

service AuthService {
  rpc Login(LoginRequest)                                 returns (LoginResponse);
  rpc Refresh(RefreshRequest)                             returns (RefreshResponse);
  rpc CreateActivationToken(CreateActivationTokenRequest) returns (CreateActivationTokenResponse);
  rpc ActivateAccount(ActivateAccountRequest)             returns (ActivateAccountResponse);
}

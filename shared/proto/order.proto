syntax = "proto3";

package order;

option go_package = "github.com/RAF-SI-2025/EXBanka-4-Backend/shared/pb/order";

// ── Ping (health check) ───────────────────────────────────────────────────────

message PingRequest {}
message PingResponse { string message = 1; }

// ── Order ─────────────────────────────────────────────────────────────────────

message Order {
  int64  id                 = 1;
  int64  user_id            = 2;
  int64  asset_id           = 3;
  string order_type         = 4; // MARKET, LIMIT, STOP, STOP_LIMIT
  int32  quantity           = 5;
  int32  contract_size      = 6;
  double price_per_unit     = 7;
  double limit_value        = 8;
  double stop_value         = 9;
  string direction          = 10; // BUY, SELL
  string status             = 11; // PENDING, APPROVED, DECLINED
  int64  approved_by        = 12;
  bool   is_done            = 13;
  string last_modification  = 14; // RFC3339
  int32  remaining_portions = 15;
  bool   after_hours        = 16;
  bool   is_aon             = 17;
  bool   is_margin          = 18;
  int64  account_id         = 19;
  int64  fund_id            = 20;
}

// ── CreateOrder ───────────────────────────────────────────────────────────────

message CreateOrderRequest {
  int64  user_id     = 1;
  string user_type   = 2; // CLIENT or EMPLOYEE
  int64  asset_id    = 3;
  int32  quantity    = 4;
  double limit_value = 5; // 0 = not set
  double stop_value  = 6; // 0 = not set
  bool   is_aon      = 7;
  bool   is_margin   = 8;
  int64  account_id  = 9;
  string direction   = 10; // BUY or SELL
  int64  fund_id     = 11; // 0 = not a fund order
}

message CreateOrderResponse {
  int64  order_id          = 1;
  string order_type        = 2;
  string status            = 3;
  double approximate_price = 4;
}

// ── ListOrders ────────────────────────────────────────────────────────────────

message ListOrdersRequest {
  string status   = 1; // ALL, PENDING, APPROVED, DECLINED, DONE — empty = ALL
  int64  agent_id = 2; // 0 = no filter
}

message ListOrdersResponse {
  repeated Order orders = 1;
}

// ── GetOrderById ──────────────────────────────────────────────────────────────

message GetOrderByIdRequest  { int64 id = 1; }
message GetOrderByIdResponse { Order order = 1; }

// ── ApproveOrder ──────────────────────────────────────────────────────────────

message ApproveOrderRequest  { int64 order_id = 1; int64 supervisor_id = 2; }
message ApproveOrderResponse {}

// ── DeclineOrder ──────────────────────────────────────────────────────────────

message DeclineOrderRequest  { int64 order_id = 1; int64 supervisor_id = 2; }
message DeclineOrderResponse {}

// ── CancelOrder ───────────────────────────────────────────────────────────────

message CancelOrderRequest  { int64 order_id = 1; int64 user_id = 2; }
message CancelOrderResponse {}

// ── CancelOrderPortions ───────────────────────────────────────────────────────

message CancelOrderPortionsRequest  { int64 order_id = 1; int64 user_id = 2; }
message CancelOrderPortionsResponse {}

// ── Service ───────────────────────────────────────────────────────────────────

service OrderService {
  rpc Ping                (PingRequest)               returns (PingResponse);
  rpc CreateOrder         (CreateOrderRequest)        returns (CreateOrderResponse);
  rpc ListOrders          (ListOrdersRequest)         returns (ListOrdersResponse);
  rpc GetOrderById        (GetOrderByIdRequest)       returns (GetOrderByIdResponse);
  rpc ApproveOrder        (ApproveOrderRequest)       returns (ApproveOrderResponse);
  rpc DeclineOrder        (DeclineOrderRequest)       returns (DeclineOrderResponse);
  rpc CancelOrder         (CancelOrderRequest)        returns (CancelOrderResponse);
  rpc CancelOrderPortions (CancelOrderPortionsRequest) returns (CancelOrderPortionsResponse);
  rpc GetActuaryProfits   (GetActuaryProfitsRequest)   returns (GetActuaryProfitsResponse);
}

// ── GetActuaryProfits ─────────────────────────────────────────────────────────

message GetActuaryProfitsRequest {
  repeated int64 user_ids = 1; // empty = all EMPLOYEE orders
}
message ActuaryProfit {
  int64  user_id    = 1;
  double profit_rsd = 2;
}
message GetActuaryProfitsResponse {
  repeated ActuaryProfit profits = 1;
}
